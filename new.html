<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Item - Portal de Achados e Perdidos</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo-catolica.png" type="image/png">
</head>

<body>

<main class="container d-flex align-items-center justify-content-center my-5">

    <div class="row w-100 justify-content-center">

        <div class="col-md-9 col-lg-7 col-xl-6">

            <!-- Botão Voltar -->
            <div class="mb-3">
                <a href="show.html"
                   class="btn btn-link text-decoration-none text-secondary p-0 hover-link fw-semibold">
                    <i class="bi bi-arrow-left me-1"></i>
                    Voltar para o Mural
                </a>
            </div>

            <div class="card catolica-card border-0 shadow-lg">

                <div class="catolica-card-header-bar"></div>

                <div class="p-4 p-sm-5">

                    <div class="text-center mb-4">

                        <div class="d-inline-flex align-items-center justify-content-center p-3 rounded-circle mb-3"
                             style="background-color: var(--primary-light);">

                            <i class="bi bi-file-earmark-plus-fill fs-1"
                               style="color: var(--primary-color);"></i>

                        </div>

                        <h3 class="fw-bold">
                            Registrar Item
                        </h3>

                        <p class="text-muted small">
                            Preencha as informações do item para publicar no portal.
                        </p>

                    </div>

                    <form id="itemForm" class="needs-validation" novalidate>

                        <div class="form-floating mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="titleInput"
                                placeholder="Título"
                                required>

                            <label for="titleInput">
                                <i class="bi bi-tag me-2"></i>
                                Título do Item
                            </label>

                            <div class="invalid-feedback">
                                Informe o título do item.
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <div class="form-floating">

                                    <select
                                        class="form-select"
                                        id="typeSelect"
                                        required>

                                        <option value="" selected disabled>
                                            Selecione
                                        </option>

                                        <option>Achado</option>
                                        <option>Perdido</option>

                                    </select>

                                    <label for="typeSelect">
                                        <i class="bi bi-question-circle me-2"></i>
                                        Tipo
                                    </label>

                                    <div class="invalid-feedback">
                                        Escolha um tipo.
                                    </div>

                                </div>

                            </div>

                            <div class="col-md-6 mb-3">

                                <div class="form-floating">

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="locationInput"
                                        placeholder="Local"
                                        required>

                                    <label for="locationInput">
                                        <i class="bi bi-geo-alt me-2"></i>
                                        Local
                                    </label>

                                    <div class="invalid-feedback">
                                        Informe o local.
                                    </div>

                                </div>

                            </div>

                        </div>

                        <div class="form-floating mb-4">

                            <textarea
                                class="form-control"
                                id="descriptionInput"
                                style="height:150px"
                                placeholder="Descrição"
                                required></textarea>

                            <label for="descriptionInput">
                                <i class="bi bi-card-text me-2"></i>
                                Descrição
                            </label>

                            <div class="invalid-feedback">
                                Escreva uma descrição.
                            </div>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-catolica w-100 py-3 rounded-pill fw-bold">

                            <i class="bi bi-cloud-upload me-2"></i>

                            Publicar no Mural

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
    'use strict';

    const forms = document.querySelectorAll('.needs-validation');

    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {

            event.preventDefault();

            if (!form.checkValidity()) {
                event.stopPropagation();
            } else {
                alert("Item registrado com sucesso!\n\nEsta é uma demonstração estática para o GitHub Pages.");
                form.reset();
                form.classList.remove('was-validated');
                return;
            }

            form.classList.add('was-validated');
        });
    });
})();
</script>

</body>
</html>
