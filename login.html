<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal de Achados e Perdidos</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Ícone -->
    <link rel="icon" href="logo-catolica.png" type="image/png">
</head>

<body>

<main class="container d-flex align-items-center justify-content-center py-5">

    <div class="row w-100 justify-content-center">

        <div class="col-md-7 col-lg-5 col-xl-4">

            <div class="card catolica-card border-0 shadow-lg">

                <div class="catolica-card-header-bar"></div>

                <div class="p-4 p-sm-5">

                    <div class="text-center mb-4">

                        <img src="logo-catolica.png"
                             alt="Logo Católica SC"
                             class="img-fluid mb-3"
                             style="max-height:55px;">

                        <h3 class="fw-bold text-dark">
                            Portal de Acesso
                        </h3>

                        <p class="text-muted small">
                            Entre com suas credenciais acadêmicas.
                        </p>

                    </div>

                    <form class="needs-validation" novalidate>

                        <div class="form-floating mb-3">

                            <input
                                type="text"
                                class="form-control"
                                id="loginInput"
                                placeholder="Email"
                                required>

                            <label for="loginInput">
                                <i class="bi bi-person me-2"></i>
                                E-mail ou Usuário
                            </label>

                            <div class="invalid-feedback">
                                Informe seu usuário.
                            </div>

                        </div>

                        <div class="mb-4">

                            <div class="input-group">

                                <div class="form-floating flex-grow-1">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="passwordInput"
                                        placeholder="Senha"
                                        required>

                                    <label for="passwordInput">
                                        <i class="bi bi-key me-2"></i>
                                        Senha
                                    </label>

                                </div>

                                <button
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    id="togglePassword">

                                    <i class="bi bi-eye" id="toggleIcon"></i>

                                </button>

                            </div>

                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">

                            <div class="form-check">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="rememberMe">

                                <label class="form-check-label" for="rememberMe">
                                    Lembrar-me
                                </label>
                            </div>

                            <a href="#" class="text-decoration-none small">
                                Esqueceu a senha?
                            </a>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-catolica w-100 py-3 rounded-pill fw-bold">

                            <i class="bi bi-box-arrow-in-right me-2"></i>

                            Entrar

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <span class="text-secondary">
                            Não possui uma conta?
                        </span>

                        <a href="register.html"
                           class="fw-bold text-decoration-none">
                            Cadastre-se
                        </a>

                    </div>

                    <div class="text-center mt-3">

                        <a href="index.html"
                           class="btn btn-outline-secondary btn-sm rounded-pill">
                            ← Voltar para o início
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("passwordInput");
const toggleIcon = document.getElementById("toggleIcon");

togglePassword.addEventListener("click", () => {
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        passwordInput.type = "password";
        toggleIcon.classList.replace("bi-eye-slash", "bi-eye");
    }
});

(() => {
    'use strict';

    const forms = document.querySelectorAll('.needs-validation');

    Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {

            event.preventDefault();

            if (!form.checkValidity()) {
                event.stopPropagation();
            } else {
                alert("Esta é uma demonstração estática. O login não está conectado a um servidor.");
            }

            form.classList.add('was-validated');
        });
    });

})();
</script>

</body>
</html>
