<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Portal de Achados e Perdidos</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" href="logo-catolica.png" type="image/png">
</head>

<body>

<main class="container d-flex align-items-center justify-content-center py-5">

    <div class="row w-100 justify-content-center">

        <div class="col-md-9 col-lg-7 col-xl-6">

            <div class="card catolica-card border-0 shadow-lg">

                <div class="catolica-card-header-bar"></div>

                <div class="p-4 p-sm-5">

                    <div class="text-center mb-4">

                        <img src="logo-catolica.png"
                             alt="Logo Católica SC"
                             class="img-fluid mb-3"
                             style="max-height:55px;">

                        <h3 class="fw-bold">
                            Criar Nova Conta
                        </h3>

                        <p class="text-muted small">
                            Preencha os dados abaixo para cadastrar-se.
                        </p>

                    </div>

                    <form id="registerForm" class="needs-validation" novalidate>

                        <div class="row">

                            <div class="col-md-12 mb-3">

                                <div class="form-floating">

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="fullNameInput"
                                        placeholder="Nome Completo"
                                        required>

                                    <label for="fullNameInput">
                                        <i class="bi bi-card-text me-2"></i>
                                        Nome Completo
                                    </label>

                                    <div class="invalid-feedback">
                                        Informe seu nome.
                                    </div>

                                </div>

                            </div>

                            <div class="col-md-6 mb-3">

                                <div class="form-floating">

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="usernameInput"
                                        placeholder="Usuário"
                                        required>

                                    <label for="usernameInput">
                                        <i class="bi bi-person me-2"></i>
                                        Usuário
                                    </label>

                                </div>

                            </div>

                            <div class="col-md-6 mb-3">

                                <div class="form-floating">

                                    <input
                                        type="email"
                                        class="form-control"
                                        id="emailInput"
                                        placeholder="Email"
                                        required>

                                    <label for="emailInput">
                                        <i class="bi bi-envelope me-2"></i>
                                        E-mail
                                    </label>

                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <div class="input-group">

                                <div class="form-floating flex-grow-1">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="passwordInput"
                                        placeholder="Senha"
                                        required>

                                    <label for="passwordInput">
                                        <i class="bi bi-key me-2"></i>
                                        Senha
                                    </label>

                                </div>

                                <button
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    id="togglePassword">

                                    <i class="bi bi-eye" id="toggleIcon"></i>

                                </button>

                            </div>

                        </div>

                        <div class="mb-4">

                            <div class="input-group">

                                <div class="form-floating flex-grow-1">

                                    <input
                                        type="password"
                                        class="form-control"
                                        id="confirmPasswordInput"
                                        placeholder="Confirmar Senha"
                                        required>

                                    <label for="confirmPasswordInput">
                                        <i class="bi bi-check-all me-2"></i>
                                        Confirmar Senha
                                    </label>

                                </div>

                                <button
                                    class="btn btn-outline-secondary"
                                    type="button"
                                    id="toggleConfirmPassword">

                                    <i class="bi bi-eye" id="toggleConfirmIcon"></i>

                                </button>

                            </div>

                            <div class="text-danger small mt-2" id="passwordMatchFeedback"></div>

                        </div>

                        <div class="form-check mb-4">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="termsCheck"
                                required>

                            <label class="form-check-label" for="termsCheck">

                                Eu concordo com os
                                <a href="#" class="text-decoration-none">
                                    Termos de Uso
                                </a>

                            </label>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-catolica w-100 py-3 rounded-pill fw-bold">

                            <i class="bi bi-person-check me-2"></i>

                            Registrar Conta

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <span class="text-secondary">
                            Já possui uma conta?
                        </span>

                        <a href="login.html"
                           class="fw-bold text-decoration-none">
                            Entrar
                        </a>

                    </div>

                    <div class="text-center mt-3">

                        <a href="index.html"
                           class="btn btn-outline-secondary btn-sm rounded-pill">
                            ← Voltar ao início
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function togglePassword(buttonId,inputId,iconId){

    const button=document.getElementById(buttonId);
    const input=document.getElementById(inputId);
    const icon=document.getElementById(iconId);

    button.addEventListener("click",()=>{

        if(input.type==="password"){
            input.type="text";
            icon.classList.replace("bi-eye","bi-eye-slash");
        }else{
            input.type="password";
            icon.classList.replace("bi-eye-slash","bi-eye");
        }

    });

}

togglePassword("togglePassword","passwordInput","toggleIcon");
togglePassword("toggleConfirmPassword","confirmPasswordInput","toggleConfirmIcon");

const form=document.getElementById("registerForm");
const password=document.getElementById("passwordInput");
const confirmPassword=document.getElementById("confirmPasswordInput");
const feedback=document.getElementById("passwordMatchFeedback");

form.addEventListener("submit",function(e){

    e.preventDefault();

    if(password.value!==confirmPassword.value){

        feedback.textContent="As senhas não coincidem.";
        confirmPassword.setCustomValidity("erro");

    }else{

        feedback.textContent="";
        confirmPassword.setCustomValidity("");

    }

    form.classList.add("was-validated");

    if(form.checkValidity()){

        alert("Cadastro realizado com sucesso!\n\nEsta é uma demonstração estática para GitHub Pages.");

        form.reset();
        form.classList.remove("was-validated");

    }

});

</script>

</body>
</html>
