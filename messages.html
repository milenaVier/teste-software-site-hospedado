<div class="container mt-3 flash-messages-container">

    <!-- Mensagem de sucesso -->
    <div class="alert alert-success alert-dismissible fade show border-0 shadow-sm d-flex align-items-center gap-3 custom-alert"
         role="alert">
        <i class="bi bi-check-circle-fill fs-4 text-success"></i>

        <div>
            Operação realizada com sucesso!
        </div>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Fechar"></button>
    </div>

    <!-- Mensagem de erro -->
    <div class="alert alert-danger alert-dismissible fade show border-0 shadow-sm d-flex align-items-center gap-3 custom-alert"
         role="alert">
        <i class="bi bi-exclamation-triangle-fill fs-4 text-danger"></i>

        <div>
            Ocorreu um erro. Esta é apenas uma demonstração estática.
        </div>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Fechar"></button>
    </div>

</div>
